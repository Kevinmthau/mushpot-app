<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mushpot</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        font-family: "Instrument Sans", "Helvetica Neue", Helvetica, sans-serif;
        background: #ffffff;
        color: #1f2a2f;
      }

      main {
        width: min(28rem, 100%);
        border: 1px solid #d8d6ca;
        border-radius: 1rem;
        padding: 1.5rem;
        background: #ffffff;
      }

      h1 {
        margin: 0;
        font-size: 1.5rem;
      }

      p {
        margin: 0.8rem 0 0;
        color: #607279;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>Reconnect to continue writing and syncing your documents.</p>
    </main>
  </body>
</html>
